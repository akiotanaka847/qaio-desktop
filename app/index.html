<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qaio</title>
    <!-- Classic (non-module) script. `defer` so it runs AFTER #root is parsed,
         yet before the deferred app bundle. Shows a clear message instead of a
         white screen when the system WebView is too old. Served verbatim from
         public/. -->

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
