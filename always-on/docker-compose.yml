# Qaio Engine — local deployment via docker compose.
# Copy `.env.example` to `.env` and fill in QAIO_ENGINE_TOKEN.

services:
  engine:
    build:
      context: ..
      dockerfile: always-on/Dockerfile
    image: qaio/engine:local
    restart: unless-stopped
    ports:
      - "7777:7777"
    environment:
      QAIO_BIND: "0.0.0.0:7777"
      QAIO_BIND_ALL: "1"
      QAIO_ENGINE_TOKEN: "${QAIO_ENGINE_TOKEN}"
    volumes:
      - qaio-home:/data/.qaio
      - qaio-docs:/data/Qaio

volumes:
  qaio-home:
  qaio-docs:
