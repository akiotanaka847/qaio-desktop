name: Build Windows MSI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-windows-

      - name: Create empty resources/bin (skip bundled CLIs for now)
        shell: bash
        run: |
          mkdir -p app/src-tauri/resources/bin
          echo '{}' > app/src-tauri/resources/bin/cli-deps.json

      - name: Build qaio-engine sidecar
        shell: bash
        run: |
          cargo build --release --target x86_64-pc-windows-msvc -p qaio-engine-server
          ls -la target/x86_64-pc-windows-msvc/release/qaio-engine.exe

      - name: Build Tauri app (Windows MSI)
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: app
          args: --target x86_64-pc-windows-msvc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Locate and upload MSI
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSI=$(find target -name "*.msi" -type f | head -1)
          if [ -z "$MSI" ]; then
            echo "::error::No MSI found"
            find target -path "*/bundle/*" -type f | head -20
            exit 1
          fi
          echo "Found: $MSI ($(du -sh "$MSI" | cut -f1))"

          # Upload as release asset if v0.4.9 draft exists, otherwise as artifact
          if gh release view v0.4.9 >/dev/null 2>&1; then
            gh release upload v0.4.9 "$MSI" --clobber
            echo "Uploaded to release v0.4.9"
          else
            echo "No release found, uploading as workflow artifact"
          fi

      - name: Upload MSI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: qaio-windows-msi
          path: target/**/bundle/msi/*.msi
          retention-days: 7
