name: Build Qaio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm
          - platform: macos-13
            target: x86_64-apple-darwin
            label: macos-intel

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: pnpm install

      - name: Build engine
        run: cargo build --release -p qaio-engine-server --target ${{ matrix.target }}

      - name: Build Qaio
        working-directory: app
        run: pnpm tauri build --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Upload artifacts (Windows)
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: Qaio-${{ matrix.label }}
          path: |
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: startsWith(matrix.label, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: Qaio-${{ matrix.label }}
          path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg
